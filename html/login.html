<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="http://localhost/expenses_management/css/login.css">
</head>
<body>
    <div class="login-container">
        <h2>Login</h2>
        <form id="loginForm" action="http://localhost/expenses_management/php/login.php" method="POST">
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required><br>
            <span id="emailError"></span><br>

            <label for="password">Password:</label><br>
            <input type="password" id="password" name="password" required><br>
            <span id="passwordError"></span><br>

            <button type="submit">Login</button>
        </form>
    </div>
    <!-- Popup Modal -->
<div id="popup" class="popup" style="display: none;">
    <div class="popup-content">
        <p id="popup-message"></p>
        <button onclick="closePopup()">OK</button>
    </div>
</div>


    <script src="http://localhost/expenses_management/js/login.js"></script>
</body>
</html>
